<!DOCTYPE html>
<html lang="pt-br"> 
<head>
<meta charset="UTF-8">
<title>HULW/UFPB/HUBRASIL - Competitividade</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

<style>
/* (SEU CSS ORIGINAL — NÃO ALTERADO) */
body{font-family:Arial;margin:0;background:#f4f6f5;}
.institucional{text-align:center;background:white;padding:15px 10px 5px 10px;border-bottom:3px solid #8CC63F;}
.inst1{font-weight:bold;font-size:18px;color:#444;}
.inst2{font-size:16px;color:#444;font-weight:bold;}
.inst3{font-size:14px;color:#444;font-weight:bold;margin-bottom:5px;}
.header{background:#8CC63F;padding:20px;text-align:center;font-size:24px;font-weight:bold;color:#444;}
.container{padding:20px;}
.filtros{display:grid;grid-template-columns:repeat(6,1fr);gap:20px;margin-bottom:20px;background:white;padding:15px;border-radius:8px;box-shadow:0 0 8px rgba(0,0,0,0.08);}
label{font-size:12px;font-weight:bold;}
input{width:100%;padding:6px;border:1px solid #ccc;border-radius:4px;}
button{padding:8px 12px;border:none;border-radius:4px;cursor:pointer;font-weight:bold;}
.btn-aplicar{background:#8CC63F;color:white;}
.btn-limpar{background:#C00000;color:white;}
.btn-exportar{background:#444;color:white;}
.btn-imprimir{background:#4285F4;color:white;}
.indicadores{display:flex;gap:15px;margin-bottom:20px;}
.card{flex:1;background:white;border-left:6px solid #8CC63F;padding:15px;border-radius:6px;box-shadow:0 0 6px rgba(0,0,0,0.06);text-align:center;}
.card h3{margin:0;font-size:14px;}
.card p{font-size:22px;font-weight:bold;margin-top:5px;}
table{width:100%;border-collapse:collapse;background:white;font-size:12px;}
th,td{border:1px solid #ddd;padding:6px;text-align:left;}
th{background:#8CC63F;color:white;cursor:pointer;}
#contador{font-weight:bold;margin-top:10px;margin-bottom:10px;}
.observacao{margin-top:20px;padding:15px;border-radius:6px;font-size:14px;font-weight:bold;}
.obs-positiva{background:#dff5e1;border-left:6px solid #2e7d32;color:#1b5e20;}
.obs-negativa{background:#fde0e0;border-left:6px solid #c00000;color:#7a0000;}
.fontes{margin-top:10px;font-size:11px;color:#555;text-align:left;}
.graficos{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:30px;}
.grafico-card{background:white;padding:15px;border-radius:6px;box-shadow:0 0 6px rgba(0,0,0,0.06);}
.grafico-card h3{margin-top:0;font-size:14px;text-align:center;}
#loadingOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;z-index:9999;}
#loadingBox{background:white;padding:20px 30px;border-radius:8px;font-weight:bold;font-size:18px;color:#444;box-shadow:0 0 10px rgba(0,0,0,0.2);}
@media print{
@page{size:landscape;}
.filtros{display:none;}
button{display:none;}
}
</style>
</head>

<body>

<img src="https://raw.githubusercontent.com/Painel-Competitividade/imagem/main/logo_HU-EBSERH2.png" 
style="position:absolute;top:10px;left:15px;width:350px;z-index:10;">

<div id="loadingOverlay">
<div id="loadingBox">Carregando...</div>
</div>

<div class="institucional">
<div class="inst1">HOSPITAL UNIVERSITÁRIO LAURO WANDERLEY</div>
<div class="inst2">UNIVERSIDADE FEDERAL DA PARAÍBA</div>
<div class="inst3">EMPRESA BRASILEIRA DE SERVIÇOS HOSPITALARES</div>
</div>

<div class="header">PAINEL DE ANÁLISE DE COMPETITIVIDADE</div>

<div class="container">

<!-- (RESTANTE DO HTML IGUAL — OMITIDO AQUI PARA FOCO) -->

<script>

let originalData=[]
let filteredData=[]
let sortDirection=1

let chartPorte=null
let chartLinha=null
let mesSelecionadoAtual = null

const googleSheetCSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vTQH6JfKGvaPplebHWWPH_6GLvWTc_Fr6Jx5VoAhwqgAnfAPGKnlMhtM8AzJcalvA/pub?gid=1616332808&single=true&output=csv"

/* (TODAS AS FUNÇÕES ANTERIORES MANTIDAS IGUAIS) */

function updateCharts(data){

if(chartPorte){chartPorte.destroy(); chartPorte=null}
if(chartLinha){chartLinha.destroy(); chartLinha=null}

if(data.length===0) return

let me=0
let epp=0

data.forEach(r=>{
let porte=(r["Porte"]||"").toUpperCase()
if(porte==="ME") me++
if(porte==="EPP") epp++
})

let fornecedoresPorMes = {}

data.forEach(r=>{
if(!r["DataObj"]) return
let d=r["DataObj"]
let mes=String(d.getMonth()+1).padStart(2,"0")
let ano=d.getFullYear().toString().slice(2)
let chave=mes+"/"+ano
let cnpj=(r["CNPJ"]||"").replace(/\D/g,"")

if(!fornecedoresPorMes[chave]){
fornecedoresPorMes[chave]={cnpjs:new Set()}
}
if(cnpj) fornecedoresPorMes[chave].cnpjs.add(cnpj)
})

let labels=Object.keys(fornecedoresPorMes)
let valores=labels.map(l=>fornecedoresPorMes[l].cnpjs.size)

chartPorte=new Chart(document.getElementById("graficoPorte"),{
type:"bar",
data:{
labels:["ME","EPP"],
datasets:[{data:[me,epp],backgroundColor:["#8CC63F","#444"]}]
},
options:{
plugins:{
legend:{display:false},
datalabels:{color:"#000",anchor:"end",align:"top",font:{weight:"bold"}}
}
},
plugins:[ChartDataLabels]
})

chartLinha=new Chart(document.getElementById("graficoTendencia"),{
type:"line",
data:{
labels:labels,
datasets:[{data:valores,borderColor:"#8CC63F",backgroundColor:"#8CC63F"}]
},
options:{
plugins:{
legend:{display:true},
datalabels:{color:"#000",anchor:"end",align:"top",font:{weight:"bold"}}
}
},
plugins:[ChartDataLabels]
})

}

</script>

</body>
</html>
